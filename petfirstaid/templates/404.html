{% extends "base.html" %}
{% block title %}Page Not Found — PetAid{% endblock %}
{% block content %}
<div class="container py-5 text-center" style="max-width:500px">
  <div style="font-size:6rem;opacity:.2">🐾</div>
  <h1 class="section-title h2 mt-3 mb-2">Page Not Found</h1>
  <p class="text-muted mb-4">
    The guide or page you are looking for could not be found.<br>
    It may have been moved or no longer exists.
  </p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{{ url_for('index') }}" class="btn btn-primary fw-700">
      <i class="bi bi-house me-1"></i>Go Home
    </a>
    <a href="{{ url_for('search') }}" class="btn btn-outline-primary fw-700">
      <i class="bi bi-search me-1"></i>Search Guides
    </a>
  </div>
</div>
{% endblock %}
